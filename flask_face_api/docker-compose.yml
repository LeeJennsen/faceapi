services:
  api:
    build: .
    env_file:
      - .env
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/face_metadata}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GRAFANA_PUBLIC_URL: ${GRAFANA_PUBLIC_URL:-http://localhost:3000}
      PROMETHEUS_PUBLIC_URL: ${PROMETHEUS_PUBLIC_URL:-http://localhost:9090}
      ALERTMANAGER_PUBLIC_URL: ${ALERTMANAGER_PUBLIC_URL:-http://localhost:9093}
      LOKI_PUBLIC_URL: ${LOKI_PUBLIC_URL:-http://localhost:3100}
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ./logs:/app/logs
    expose:
      - "5000"
    restart: unless-stopped
    stop_grace_period: 5s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_started
    ports:
      - "${NGINX_HOST_PORT:-5000}:80"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ops/logs/nginx:/var/log/nginx
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 5s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  mysql:
    image: mysql:8
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    stop_signal: SIGTERM
    stop_grace_period: 5s

  mongo:
    image: mongo:6
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 5s
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_started
      alertmanager:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:${GRAFANA_HOST_PORT:-3000}
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    volumes:
      - ./ops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./ops/grafana/dashboards:/etc/grafana/provisioning/dashboards-json:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"
    volumes:
      - ./ops/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    depends_on:
      alertmanager:
        condition: service_started
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "${ALERTMANAGER_HOST_PORT:-9093}:9093"
    volumes:
      - ./ops/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./ops/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/faceapi:ro
      - ./ops/logs/nginx:/var/log/nginx:ro
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

  seed-demo:
    build: .
    profiles: ["tooling"]
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/face_metadata}
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_started
    command: ["python", "scripts/seed_demo_data.py"]
    volumes:
      - .:/app

  k6:
    image: grafana/k6:0.49.0
    profiles: ["tooling"]
    depends_on:
      nginx:
        condition: service_healthy
    environment:
      BASE_URL: ${K6_BASE_URL:-http://localhost:5000}
      K6_USER_EMAIL: ${K6_USER_EMAIL:-}
      K6_USER_PASSWORD: ${K6_USER_PASSWORD:-}
    volumes:
      - ./perf/k6:/scripts:ro
    command: ["run", "/scripts/smoke.js"]

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  grafana_data:
  prometheus_data:
  loki_data:
  alertmanager_data:
