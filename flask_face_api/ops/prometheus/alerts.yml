groups:
  - name: faceapi2.rules
    rules:
      - alert: Watchdog
        expr: vector(1)
        labels:
          severity: none
        annotations:
          summary: FaceAPI watchdog
          description: Heartbeat alert that confirms Prometheus and Alertmanager are connected.

      - alert: FaceApiDown
        expr: up{job="faceapi-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: FaceAPI API is down
          description: Prometheus cannot scrape the FaceAPI metrics endpoint.

      - alert: FaceApiHigh5xxRate
        expr: |
          sum(rate(faceapi_http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(faceapi_http_requests_total[5m])), 0.001)
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Elevated FaceAPI 5xx error rate
          description: More than 5% of FaceAPI requests have returned 5xx responses over the last 5 minutes.

      - alert: FaceApiSlowP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(faceapi_http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: FaceAPI p95 latency is elevated
          description: The p95 latency has been above 1 second for at least 10 minutes.
