server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: faceapi-flask
    static_configs:
      - targets:
          - localhost
        labels:
          job: faceapi-flask
          __path__: /var/log/faceapi/*.log

  - job_name: faceapi-nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: faceapi-nginx
          __path__: /var/log/nginx/*.log
