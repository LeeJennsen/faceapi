apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    {{- include "faceapi2.labels" . | nindent 4 }}
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: {{ .Values.service.grafana.port }}
      targetPort: {{ .Values.service.grafana.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $full }}-grafana
  labels:
    {{- include "faceapi2.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.grafana }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.images.grafana.repository }}:{{ .Values.images.grafana.tag }}"
          imagePullPolicy: {{ .Values.images.grafana.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.grafana.port }}
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Editor"
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /etc/grafana/provisioning/dashboards-json/faceapi-overview.json
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yml
              subPath: datasources.yml
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: grafana-dashboard-json
              mountPath: /etc/grafana/provisioning/dashboards-json/faceapi-overview.json
              subPath: faceapi-overview.json
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.grafana.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.grafana.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: grafana-data
          {{- if .Values.persistence.grafana.enabled }}
          persistentVolumeClaim:
            claimName: {{ $full }}-grafana-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: grafana-datasources
          configMap:
            name: {{ $full }}-grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: {{ $full }}-grafana-dashboard-provider
        - name: grafana-dashboard-json
          configMap:
            name: {{ $full }}-grafana-dashboard-json
