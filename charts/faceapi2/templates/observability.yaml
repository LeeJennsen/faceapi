{{- $full := include "faceapi2.fullname" . -}}
{{- $secretName := include "faceapi2.secretName" . -}}
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    {{- include "faceapi2.labels" . | nindent 4 }}
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: {{ .Values.service.redis.port }}
      targetPort: {{ .Values.service.redis.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $full }}-redis
  labels:
    {{- include "faceapi2.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.redis }}
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.images.redis.repository }}:{{ .Values.images.redis.tag }}"
          imagePullPolicy: {{ .Values.images.redis.pullPolicy }}
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: {{ .Values.service.redis.port }}
              name: redis
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: redis-data
          {{- if .Values.persistence.redis.enabled }}
          persistentVolumeClaim:
            claimName: {{ $full }}-redis-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    {{- include "faceapi2.labels" . | nindent 4 }}
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: {{ .Values.service.prometheus.port }}
      targetPort: {{ .Values.service.prometheus.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $full }}-prometheus
  labels:
    {{- include "faceapi2.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.prometheus }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: "{{ .Values.images.prometheus.repository }}:{{ .Values.images.prometheus.tag }}"
          imagePullPolicy: {{ .Values.images.prometheus.pullPolicy }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: {{ .Values.service.prometheus.port }}
              name: http
          volumeMounts:
            - name: prometheus-data
              mountPath: /prometheus
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-config
              mountPath: /etc/prometheus/alerts.yml
              subPath: alerts.yml
          readinessProbe:
            httpGet:
              path: /-/ready
              port: {{ .Values.service.prometheus.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: {{ .Values.service.prometheus.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: prometheus-data
          {{- if .Values.persistence.prometheus.enabled }}
          persistentVolumeClaim:
            claimName: {{ $full }}-prometheus-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: prometheus-config
          configMap:
            name: {{ $full }}-prometheus-config
---
