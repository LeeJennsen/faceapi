---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $full }}-mqtt
  labels:
    {{- include "faceapi2.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.mqtt }}
  selector:
    matchLabels:
      app: mqtt
  template:
    metadata:
      labels:
        app: mqtt
    spec:
      containers:
        - name: mqtt
          image: "{{ .Values.images.mqtt.repository }}:{{ .Values.images.mqtt.tag }}"
          imagePullPolicy: {{ .Values.images.mqtt.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.mqtt.port }}
              name: mqtt
            - containerPort: {{ .Values.service.mqtt.websocketPort }}
              name: mqtt-ws
          volumeMounts:
            - name: mosquitto-data
              mountPath: /mosquitto/data
            - name: mosquitto-logs
              mountPath: /mosquitto/log
            - name: mosquitto-config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
          readinessProbe:
            tcpSocket:
              port: {{ .Values.service.mqtt.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.service.mqtt.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: mosquitto-data
          {{- if .Values.persistence.mosquittoData.enabled }}
          persistentVolumeClaim:
            claimName: {{ $full }}-mosquitto-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: mosquitto-logs
          {{- if .Values.persistence.mosquittoLogs.enabled }}
          persistentVolumeClaim:
            claimName: {{ $full }}-mosquitto-logs
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: mosquitto-config
          configMap:
            name: {{ $full }}-mosquitto-config
