{{- $configName := printf "%s-config" (include "faceapi2.fullname" .) -}}
{{- $secretName := include "faceapi2.secretName" . -}}
{{- $full := include "faceapi2.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $full }}-api
  labels:
    {{- include "faceapi2.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.images.api.repository }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.api.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ $configName }}
            - secretRef:
                name: {{ $secretName }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.service.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.service.api.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $full }}-mysql
  labels:
    {{- include "faceapi2.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.mysql }}
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: "{{ .Values.images.mysql.repository }}:{{ .Values.images.mysql.tag }}"
          imagePullPolicy: {{ .Values.images.mysql.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.mysql.port }}
              name: mysql
          env:
            - name: MYSQL_DATABASE
              value: {{ .Values.config.MYSQL_DATABASE | quote }}
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$MYSQL_ROOT_PASSWORD\""]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$MYSQL_ROOT_PASSWORD\""]
            initialDelaySeconds: 45
            periodSeconds: 20
      volumes:
        - name: mysql-data
          {{- if .Values.persistence.mysql.enabled }}
          persistentVolumeClaim:
            claimName: {{ $full }}-mysql-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: mysql-init
          configMap:
            name: {{ $full }}-mysql-init
---
