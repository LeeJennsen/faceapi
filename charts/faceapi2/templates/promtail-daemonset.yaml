{{- $full := include "faceapi2.fullname" . -}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ $full }}-promtail
  labels:
    {{- include "faceapi2.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      containers:
        - name: promtail
          image: "{{ .Values.images.promtail.repository }}:{{ .Values.images.promtail.tag }}"
          imagePullPolicy: {{ .Values.images.promtail.pullPolicy }}
          args:
            - -config.file=/etc/promtail/promtail-config.yml
          volumeMounts:
            - name: promtail-config
              mountPath: /etc/promtail/promtail-config.yml
              subPath: promtail-config.yml
            - name: promtail-run
              mountPath: /run/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
      volumes:
        - name: promtail-config
          configMap:
            name: {{ $full }}-promtail-config
        - name: promtail-run
          emptyDir: {}
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory
